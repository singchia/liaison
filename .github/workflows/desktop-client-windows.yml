name: desktop-client / windows build

on:
  push:
    branches: [feat/desktop-client]
    tags: ['desktop-v*']
    paths:
      - 'desktop-client/**'
      - 'cmd/edge/**'
      - 'pkg/edge/**'
      - '.github/workflows/desktop-client-windows.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to publish the rolling pre-release

concurrency:
  group: desktop-client-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build liaison-edge.exe (subprocess bundled into the .msi)
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS        = "windows"
          $env:GOARCH      = "amd64"
          New-Item -ItemType Directory -Force -Path desktop-client/src-tauri/resources | Out-Null
          go build -trimpath -ldflags "-s -w" `
            -o desktop-client/src-tauri/resources/liaison-edge-windows-amd64.exe `
            ./cmd/edge/main.go
          dir desktop-client/src-tauri/resources/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: desktop-client/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'desktop-client/src-tauri -> target'

      - name: Install frontend deps
        working-directory: desktop-client
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (.msi + .exe installer)
        working-directory: desktop-client
        run: pnpm tauri build

      - name: Stamp installer filenames with date + commit
        # The Tauri-default name (Liaison_0.1.0_x64_en-US.msi) is stable so
        # the rolling-release URL doesn't change, but a fresh download is
        # indistinguishable from a cached one. Copy the bundles to a
        # second filename that includes the build date + short sha so a
        # tester can confirm which build they're looking at by glancing
        # at the file in their Downloads folder. Both names ship to the
        # release.
        shell: pwsh
        run: |
          $sha   = "${{ github.sha }}".Substring(0, 7)
          $date  = Get-Date -Format "yyyyMMdd-HHmm"
          $stamp = "_${date}_${sha}"
          $bundleDir = "desktop-client/src-tauri/target/release/bundle"
          foreach ($msi in Get-ChildItem -Path "$bundleDir/msi" -Filter *.msi -ErrorAction SilentlyContinue) {
            $stamped = $msi.FullName -replace '\.msi$', "$stamp.msi"
            Copy-Item $msi.FullName $stamped
            Write-Host "  stamped: $stamped"
          }
          foreach ($exe in Get-ChildItem -Path "$bundleDir/nsis" -Filter *-setup.exe -ErrorAction SilentlyContinue) {
            $stamped = $exe.FullName -replace '-setup\.exe$', "${stamp}-setup.exe"
            Copy-Item $exe.FullName $stamped
            Write-Host "  stamped: $stamped"
          }

      - name: Locate produced bundles
        id: bundles
        shell: pwsh
        run: |
          $bundleDir = "desktop-client/src-tauri/target/release/bundle"
          $msi = Get-ChildItem -Path "$bundleDir/msi"  -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsis = Get-ChildItem -Path "$bundleDir/nsis" -Filter *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi -and -not $nsis) {
            Write-Error "No installer produced in $bundleDir"
            Get-ChildItem -Path $bundleDir -Recurse -ErrorAction SilentlyContinue
            exit 1
          }
          if ($msi)  { echo "msi=$($msi.FullName)"  >> $env:GITHUB_OUTPUT }
          if ($nsis) { echo "nsis=$($nsis.FullName)" >> $env:GITHUB_OUTPUT }
          echo "produced:"
          if ($msi)  { echo "  msi : $($msi.FullName) ($([math]::Round($msi.Length/1MB,1)) MB)" }
          if ($nsis) { echo "  exe : $($nsis.FullName) ($([math]::Round($nsis.Length/1MB,1)) MB)" }

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: liaison-desktop-windows-${{ github.sha }}
          path: |
            desktop-client/src-tauri/target/release/bundle/msi/*.msi
            desktop-client/src-tauri/target/release/bundle/nsis/*-setup.exe
          retention-days: 30
          if-no-files-found: error

      - name: Publish rolling pre-release (feat/desktop-client only)
        if: github.ref == 'refs/heads/feat/desktop-client'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: 'Liaison Desktop (latest from feat/desktop-client)'
          prerelease: true
          files: |
            desktop-client/src-tauri/target/release/bundle/msi/*.msi
            desktop-client/src-tauri/target/release/bundle/nsis/*-setup.exe
          body: |
            **Auto-built rolling release** from `feat/desktop-client` HEAD.

            - Commit: `${{ github.sha }}`
            - Built at: ${{ github.event.head_commit.timestamp }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download the `.msi` (recommended) or the `.exe` setup. Both are
            unsigned for v0.1 — Windows SmartScreen will warn on first run;
            click "More info" -> "Run anyway".

            WebView2 Runtime is required at runtime. Win10 1803+ and Win11
            ship it. On Windows Server install it from
            https://developer.microsoft.com/microsoft-edge/webview2/.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: 'Liaison Desktop ${{ github.ref_name }}'
          files: |
            desktop-client/src-tauri/target/release/bundle/msi/*.msi
            desktop-client/src-tauri/target/release/bundle/nsis/*-setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
